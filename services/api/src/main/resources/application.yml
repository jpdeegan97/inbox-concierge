spring:
  application:
    name: inboxconcierge
  datasource:
    url: jdbc:h2:mem:inbox_concierge
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-client-secret}
            scope: openid, profile, email, https://www.googleapis.com/auth/gmail.readonly
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  h2:
    console:
      enabled: true

server:
  port: 8080

cors:
  allowed-origins: http://localhost:5198


