spring:
  application:
    name: inboxconcierge
  datasource:
    url: jdbc:h2:mem:inbox_concierge
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173
